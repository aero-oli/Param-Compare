name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  NODE_VERSION: 22

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must look like v1.2.3" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Verify package version matches tag
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected="${{ steps.release_tag.outputs.tag }}"
          expected="${expected#v}"
          if [ "$package_version" != "$expected" ]; then
            echo "package.json version $package_version does not match tag ${{ steps.release_tag.outputs.tag }}" >&2
            exit 1
          fi

  build-windows:
    name: Build Windows installer
    needs: validate
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  build-linux:
    name: Build Linux packages
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build Linux packages
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  build-macos:
    name: Build macOS packages
    needs: validate
    runs-on: macos-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build macOS packages
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  attest-release-artifacts:
    name: Attest release artifacts
    needs:
      - validate
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS' -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: release-artifacts/*

      - name: Upload attested release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attested-release
          path: release-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - validate
      - attest-release-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: attested-release
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ArduPilot Param Compare ${{ needs.validate.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.tag, '-rc') || contains(needs.validate.outputs.tag, '-beta') || contains(needs.validate.outputs.tag, '-alpha') }}
          generate_release_notes: true
          files: release-artifacts/*
